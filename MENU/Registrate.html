<!-- registro.html -->
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport"
content="width=device-width, initial-scale=1">

<title>Registro | AJAC Court Kings</title>

<link rel="stylesheet"
href="../bulma/css/bulma.min.css">

<link rel="preconnect"
href="https://fonts.googleapis.com">

<link rel="preconnect"
href="https://fonts.gstatic.com"
crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Poppins:wght@300;500;700;900&display=swap" rel="stylesheet">

<style>

body{
    background:linear-gradient(135deg,#000,#8b0000,#3b0000);
    min-height:100vh;
    font-family:'Poppins', sans-serif;
}

.caja{
    max-width:500px;
    margin:auto;
    margin-top:50px;
    border-radius:25px;
    padding:35px;
    box-shadow:0px 0px 30px rgba(0,0,0,0.5);
}

.titulo{
    font-family:'Bebas Neue', sans-serif;
    font-size:60px;
    text-align:center;
    color:#8b0000;
    letter-spacing:4px;
}

.boton-ajac{
    border-radius:15px;
    font-weight:bold;
    transition:0.3s;
}

.boton-ajac:hover{
    transform:scale(1.05);
}

.volver{
    margin-top:15px;
}

</style>

</head>

<body>

<div class="box caja">

<h1 class="titulo">
AJAC
</h1>

<h2 class="subtitle has-text-centered">
Crear Cuenta
</h2>

<div class="field">

<label class="label">
Nombre
</label>

<div class="control">
<input class="input is-danger"
type="text"
placeholder="Tu nombre">
</div>

</div>

<div class="field">

<label class="label">
Correo electrónico
</label>

<div class="control">
<input class="input is-danger"
type="email"
placeholder="Tu correo">
</div>

</div>

<div class="field">

<label class="label">
Contraseña
</label>

<div class="control">
<input class="input is-danger"
type="password"
placeholder="Tu contraseña">
</div>

</div>

<button class="button is-danger is-fullwidth boton-ajac">
Registrarse
</button>

<a href="../INDEX.html"
class="button is-dark is-fullwidth volver">
⬅ Volver al inicio
</a>

</div>

</body>
</html>
