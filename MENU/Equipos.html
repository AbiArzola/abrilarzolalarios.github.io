<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:'Poppins',sans-serif;
  background:#f4f4f4;
}

/* TITULO */
.title{
  text-align:center;
  margin-top:30px;
  margin-bottom:30px;
  font-weight:900;
  position:relative;
}

/* línea decorativa */
.title::after{
  content:"";
  display:block;
  width:120px;
  height:4px;
  background:#8B0000;
  margin:10px auto 0 auto;
  border-radius:5px;
}

/* CARD MEJORADA (solo bordes y sombra) */
.card{
  border:2px solid #ddd;
  border-radius:14px;
  overflow:hidden;
  box-shadow:0 6px 15px rgba(0,0,0,0.15);
  transition:0.3s;
}

.card:hover{
  transform:translateY(-6px);
  box-shadow:0 10px 25px rgba(0,0,0,0.25);
}

/* IMÁGENES */
.img-interactiva{
  transition:0.4s;
}

.img-interactiva:hover{
  transform:scale(1.05);
}

/* BOTÓN VER MÁS (solo borde, sin cambiar color base) */
.button.is-warning{
  border:2px solid #8B0000;
  font-weight:700;
  transition:0.3s;
}

.button.is-warning:hover{
  transform:scale(1.05);
  border-color:#5a0000;
}

/* BOTÓN ROJO OSCURO */
.btn-rojo-oscuro{
  background:#8B0000;
  color:white;
  border:none;
  font-weight:700;
  transition:0.3s;
  border-radius:10px;
}

.btn-rojo-oscuro:hover{
  background:#5a0000;
  transform:scale(1.05);
}

/* GALERÍA */
#fotos img{
  border:3px solid #ddd;
  border-radius:12px;
  box-shadow:0 6px 15px rgba(0,0,0,0.15);
  transition:0.3s;
}

#fotos img:hover{
  transform:scale(1.07);
  border-color:#8B0000;
}

</style>
</head>
