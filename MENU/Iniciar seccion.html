<!-- Iniciar seccion.html -->
<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="utf-8">

<meta name="viewport"
content="width=device-width, initial-scale=1">

<title>Iniciar Sesión</title>

<link rel="stylesheet"
href="../bulma/css/bulma.min.css">

<link rel="preconnect"
href="https://fonts.googleapis.com">

<link rel="preconnect"
href="https://fonts.gstatic.com"
crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Poppins:wght@300;500;700;900&display=swap" rel="stylesheet">

<style>

body{
background:linear-gradient(135deg,#1a0000,#8b0000,#000);
min-height:100vh;
font-family:'Poppins',sans-serif;
display:flex;
justify-content:center;
align-items:center;
}

.caja{
width:420px;
padding:35px;
border-radius:25px;
box-shadow:0 0 30px rgba(0,0,0,0.5);
}

.titulo{
font-family:'Bebas Neue',sans-serif;
font-size:65px;
text-align:center;
color:#8b0000;
letter-spacing:5px;
}

.boton{
margin-top:15px;
border-radius:15px;
font-weight:bold;
}

</style>

</head>

<body>

<div class="box caja">

<h1 class="titulo">
AJAC
</h1>

<h2 class="subtitle has-text-centered">
Iniciar Sesión
</h2>

<div class="field">

<label class="label">
Correo
</label>

<div class="control">

<input class="input is-danger"
type="email"
placeholder="Ingresa tu correo">

</div>
</div>

<div class="field">

<label class="label">
Contraseña
</label>

<div class="control">

<input class="input is-danger"
type="password"
placeholder="Ingresa tu contraseña">

</div>
</div>

<button class="button is-danger is-fullwidth boton">
Entrar
</button>

<a href="../INDEX.html"
class="button is-dark is-fullwidth boton">

⬅ Volver al inicio

</a>

</div>

</body>
</html>
